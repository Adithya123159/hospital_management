<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MediBook Hospital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
 
        :root {
            --primary-blue: #0a58ca;
            --dark-navy: #002347;
            --glass-white: rgba(255, 255, 255, 0.85);
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

     
        @keyframes kenBurns {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #000;
        }

        .moving-bg {
            width: 100%;
            height: 100%;
          
            background-image: linear-gradient(rgba(10, 88, 202, 0.4), rgba(0, 35, 71, 0.7)), 
                              url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            animation: kenBurns 30s ease-in-out infinite;
        }

    
        .login-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }


        .login-card {
            background: var(--glass-white);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .navbar-brand-logo {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-blue);
            text-decoration: none;
            display: block;
            margin-bottom: 5px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--dark-navy);
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #d1d5db;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(10, 88, 202, 0.15);
            border-color: var(--primary-blue);
        }

      
        .btn-login {
            background: linear-gradient(135deg, var(--primary-blue), #003a8c);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(10, 88, 202, 0.4);
            color: white;
        }

        .footer-text {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 25px;
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="moving-bg"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card text-center">
            <a href="#" class="navbar-brand-logo">🌐 MediBook</a>
            <p class="text-muted mb-4">Patient & Doctor Portal Login</p>
            
            <form action="index.html">
                <div class="text-start mb-3">
                    <label class="form-label">Email / Username</label>
                    <input type="email" class="form-control" placeholder="name@medibook.com" required>
                </div>
                
                <div class="text-start mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="rem">
                        <label class="form-check-label small" for="rem">Stay logged in</label>
                    </div>
                    <a href="#" class="small text-primary text-decoration-none">Forgot?</a>
                </div>

                <button type="submit" class="btn btn-login w-100">Sign In</button>
            </form>

            <div class="footer-text">
                Don't have access? <a href="#" class="text-primary fw-bold text-decoration-none">Contact IT Admin</a>
            </div>
        </div>
    </div>

</body>
</html>
